<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prets Vehicules</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F4F0;--surf:#FFF;--surf2:#EFEDE8;--bord:#E0DDD6;--txt:#1A1916;--txt2:#6B6860;--acc:#2D5BE3;--acc-l:#EEF2FD;--acc-t:#1A3A9C;--ok:#1A7A4A;--ok-b:#E8F5EE;--warn:#8A5A00;--warn-b:#FFF4D6;--err:#C0392B;--err-b:#FDECEA;--r:14px;--rl:20px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:24px;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:1rem;padding-bottom:100px;}
/* HEADER */
.hdr{background:var(--surf);border-bottom:1px solid var(--bord);padding:0 18px;display:flex;align-items:center;height:80px;position:sticky;top:0;z-index:100;gap:14px;}
.bico{width:52px;height:52px;background:var(--acc);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bico svg{fill:white;width:28px;height:28px;}
.htitle{font-weight:600;font-size:26px;flex:1;}
/* NAV BAS */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:2px solid var(--bord);display:flex;height:90px;z-index:100;}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:16px;font-weight:500;color:var(--txt2);padding:0;}
.bni.on{color:var(--acc);}
.bni svg{width:36px;height:36px;fill:currentColor;}
/* PAGES */
.pg{display:none;padding:18px;}
.pg.on{display:block;}
/* CARDS */
.card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rl);padding:18px;margin-bottom:14px;}
.pt{font-size:32px;font-weight:600;margin-bottom:8px;}
.ps{font-size:18px;color:var(--txt2);}
/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.sc{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:18px;}
.sv{font-size:40px;font-weight:600;}
.sl{font-size:17px;color:var(--txt2);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;}
/* PRET CARDS */
.pc{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rl);padding:16px;margin-bottom:12px;}
.pc-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.pc-veh{font-weight:600;font-size:24px;}
.pc-sub{font-size:19px;color:var(--txt2);margin-top:5px;}
.pc-body{font-size:20px;color:var(--txt2);line-height:2.2;}
.pc-foot{display:flex;gap:10px;margin-top:14px;}
/* BADGES */
.bdg{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border-radius:20px;font-size:18px;font-weight:500;}
.bok{background:var(--ok-b);color:var(--ok);}
.berr{background:var(--err-b);color:var(--err);}
.bwarn{background:var(--warn-b);color:var(--warn);}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block;}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:20px 28px;border-radius:var(--r);border:none;cursor:pointer;font-family:inherit;font-size:22px;font-weight:500;}
.btn-full{width:100%;}
.bp{background:var(--acc);color:white;}
.bs{background:var(--surf2);color:var(--txt);border:1px solid var(--bord);}
.bd{background:var(--err-b);color:var(--err);border:1px solid #F5B4B0;}
.bo{background:var(--ok-b);color:var(--ok);border:1px solid #A5DEC0;}
.bsm{padding:14px 20px;font-size:19px;}
/* FORM */
.fg{margin-bottom:18px;}
.fl{display:block;font-size:18px;font-weight:600;color:var(--txt2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em;}
.fc{width:100%;padding:16px 18px;border:1.5px solid var(--bord);border-radius:var(--r);background:var(--surf);font-family:inherit;font-size:24px;color:var(--txt);outline:none;}
.fc:focus{border-color:var(--acc);}
select.fc{height:72px;}
.fsec{background:var(--surf2);border-radius:var(--r);padding:16px;margin-bottom:16px;border:1px solid var(--bord);}
.fst{font-size:15px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
/* STEPS */
.steps{display:flex;align-items:center;margin-bottom:24px;}
.stp{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:500;}
.stn{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;border:2px solid var(--bord);color:var(--txt2);background:var(--surf);flex-shrink:0;}
.stp.on .stn{border-color:var(--acc);color:var(--acc-t);background:var(--acc-l);}
.stp.dn .stn{border-color:var(--ok);color:white;background:var(--ok);}
.stl{color:var(--txt2);font-size:17px;}
.stp.on .stl{color:var(--txt);}
.ssep{flex:1;height:1px;background:var(--bord);margin:0 4px;}
.sp{display:none;}
.sp.on{display:block;}
/* INFO BOX */
.ibox{padding:16px 18px;background:var(--acc-l);border-radius:var(--r);border:1px solid rgba(45,91,227,.2);font-size:17px;margin-bottom:14px;line-height:1.6;}
/* BENEVOLES */
.bl{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;}
.bi{display:flex;align-items:center;gap:14px;padding:14px 16px;border:2px solid var(--bord);border-radius:var(--r);cursor:pointer;background:var(--surf);}
.bi.on{border-color:var(--acc);background:var(--acc-l);}
.bav{width:64px;height:64px;border-radius:50%;background:var(--acc-l);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:600;color:var(--acc-t);flex-shrink:0;}
/* SIGNATURE */
.swrap{border:2px solid var(--bord);border-radius:var(--r);overflow:hidden;background:white;}
canvas{display:block;width:100%;height:160px;cursor:crosshair;touch-action:none;}
/* FILTRES */
.fb{display:flex;gap:10px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.ch{padding:9px 18px;border-radius:20px;border:1px solid var(--bord);background:var(--surf);font-size:14px;font-weight:500;color:var(--txt2);cursor:pointer;white-space:nowrap;}
.ch.on{background:var(--acc-l);color:var(--acc-t);border-color:var(--acc);}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;}
.mo.hid{display:none;}
.md{background:var(--surf);border-radius:20px 20px 0 0;width:100%;padding:24px;}
.mt{font-size:18px;font-weight:600;margin-bottom:12px;}
.mf{display:flex;gap:10px;margin-top:20px;}
/* MISC */
.emp{text-align:center;padding:40px 20px;color:var(--txt2);font-size:15px;}
.ld{display:inline-block;width:20px;height:20px;border:2px solid var(--bord);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:100px;left:12px;right:12px;padding:18px 22px;border-radius:var(--r);font-size:20px;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .2s;background:var(--txt);color:white;text-align:center;}
.toast.on{opacity:1;transform:translateY(0);}
.toast.ok{background:var(--ok);}
.toast.err{background:var(--err);}
/* VEHICULES */
.vrow{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--bord);background:var(--surf);}
.vrow.ind{background:#FDF0EF;}
.vrow-l{flex:1;}
.vrow-lnde{font-weight:600;font-size:24px;}
.vrow-type{font-size:19px;color:var(--txt2);margin-top:4px;}
.vrow-plaque{font-family:'DM Mono',monospace;font-size:18px;color:var(--txt2);margin-top:4px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="bico"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg></div>
  <div class="htitle">Prets Vehicules</div>
</div>

<!-- DASHBOARD -->
<div id="pg0" class="pg on">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <div><div class="pt">Bonjour</div><div class="ps" id="dash-date"></div></div>
  </div>
  <div class="sg">
    <div class="sc"><div class="sv" id="s0">0</div><div class="sl">Total</div></div>
    <div class="sc"><div class="sv" id="s1">0</div><div class="sl">En cours</div></div>
    <div class="sc"><div class="sv" id="s2">0</div><div class="sl">Termines</div></div>
    <div class="sc"><div class="sv" id="s3">0</div><div class="sl">Vehicules</div></div>
  </div>
  <div style="font-size:16px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">Prets en cours</div>
  <div id="dash-list"><div class="emp"><div class="ld"></div></div></div>
</div>

<!-- NOUVEAU PRET -->
<div id="pg1" class="pg">
  <div class="pt" style="margin-bottom:16px;">Nouveau pret</div>
  <div class="card">
    <div class="steps">
      <div class="stp on" id="si0"><div class="stn">1</div><div class="stl">Vehicule</div></div>
      <div class="ssep"></div>
      <div class="stp" id="si1"><div class="stn">2</div><div class="stl">Dates</div></div>
      <div class="ssep"></div>
      <div class="stp" id="si2"><div class="stn">3</div><div class="stl">Benevole</div></div>
      <div class="ssep"></div>
      <div class="stp" id="si3"><div class="stn">4</div><div class="stl">Signature</div></div>
    </div>
    <div class="sp on" id="sp0">
      <div class="fg">
        <label class="fl">Vehicule</label>
        <select class="fc" id="sel-v" onchange="onVeh()">
          <option value="">-- Selectionner --</option>
        </select>
      </div>
      <div id="v-info" style="display:none;" class="ibox"></div>
      <button class="btn bp btn-full" style="margin-top:12px;" onclick="s1next()">Suivant</button>
    </div>
    <div class="sp" id="sp1">
      <div id="v-recap" class="ibox"></div>
      <div class="fsec">
        <div class="fst">Depart</div>
        <div class="fg"><label class="fl">Date</label><input type="date" class="fc" id="dd"></div>
        <div class="fg"><label class="fl">Heure</label><input type="time" class="fc" id="hd"></div>
      </div>
      <div class="fsec">
        <div class="fst">Retour prevu</div>
        <div class="fg"><label class="fl">Date</label><input type="date" class="fc" id="dr"></div>
        <div class="fg"><label class="fl">Heure</label><input type="time" class="fc" id="hr"></div>
      </div>
      <div id="dm" style="display:none;padding:10px;border-radius:var(--r);margin-bottom:12px;font-size:16px;"></div>
      <div style="display:flex;gap:8px;">
        <button class="btn bs" style="flex:1" onclick="gos(0)">Retour</button>
        <button class="btn bp" style="flex:2" onclick="chkDispo()">Verifier dispo</button>
        <button class="btn bp" id="btn-dispo-next" style="display:none;flex:1" onclick="gos(2)">Suivant</button>
      </div>
    </div>
    <div class="sp" id="sp2">
      <div class="fg"><input type="text" class="fc" id="sb" placeholder="Rechercher benevole..." oninput="renBenv(this.value)"></div>
      <div class="bl" id="bl"><div class="emp"><div class="ld"></div></div></div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn bs" style="flex:1" onclick="gos(1)">Retour</button>
        <button class="btn bp" style="flex:1" onclick="s3next()">Suivant</button>
      </div>
    </div>
    <div class="sp" id="sp3">
      <div id="recap" class="ibox" style="line-height:1.8;margin-bottom:14px;font-size:16px;"></div>
      <div class="fg">
        <label class="fl">Signature</label>
        <div class="swrap"><canvas id="sig" style="display:block;width:100%;height:130px;cursor:crosshair;touch-action:none;"></canvas></div>
        <button class="btn bs bsm" style="margin-top:8px;" onclick="clrSig()">Effacer</button>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn bs" style="flex:1" onclick="gos(2)">Retour</button>
        <button class="btn bp" style="flex:2" id="bval" onclick="valider()">Valider</button>
      </div>
    </div>
  </div>
</div>

<!-- LISTING -->
<div id="pg2" class="pg">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <div class="pt">Listing <span style="font-size:16px;font-weight:400;color:var(--txt2)" id="lc"></span></div>
    <button class="btn bs bsm" onclick="loadAll()">Actualiser</button>
  </div>
  <div class="fb">
    <div class="ch on" onclick="setF(0,this)">Tous</div>
    <div class="ch" onclick="setF(1,this)">En cours</div>
    <div class="ch" onclick="setF(2,this)">Termines</div>
  </div>
  <div id="lst-list"><div class="emp"><div class="ld"></div></div></div>
</div>

<!-- VEHICULES -->
<div id="pg3" class="pg">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <div class="pt">Vehicules <span style="font-size:16px;font-weight:400;color:var(--txt2)" id="vc"></span></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden;">
    <div id="veh-list"><div class="emp"><div class="ld"></div></div></div>
  </div>
</div>

<!-- MODAL -->
<div class="mo hid" id="modal">
  <div class="md">
    <div class="mt" id="mt"></div>
    <div id="mb"></div>
    <div class="mf" id="mf"></div>
  </div>
</div>

<div class="bnav">
  <button class="bni on" id="bni0" onclick="nav(0)">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Bord
  </button>
  <button class="bni" id="bni1" onclick="nav(1)">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Nouveau
  </button>
  <button class="bni" id="bni2" onclick="nav(2)">
    <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>Listing
  </button>
  <button class="bni" id="bni3" onclick="nav(3)">
    <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>Vehicules
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
var GAS_URL = 'https://prets-proxy.lemagasingue.workers.dev';
var V=[],B=[],P=[],selV=null,selB=null,filt=0;
var sc,sx,sdr=false,sdh=false;


function gasCall(method, params, onSuccess, onError) {
  var url = GAS_URL + '?action=' + method;
  if (params) url += '&data=' + encodeURIComponent(JSON.stringify(params));
  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      try {
        var d = JSON.parse(txt);
        if (onSuccess) onSuccess(d);
      } catch(e) {
        console.error('Parse error for ' + method + ':', txt.substring(0,200));
        if (onError) onError(new Error('Reponse invalide'));
      }
    })
    .catch(function(e) {
      console.error('Fetch error for ' + method + ':', e.message);
      if (onError) onError(e);
    });
}

window.onload=function(){
  var d=new Date();
  document.getElementById("dash-date").textContent=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  initDates();
  loadAll();
};

function pad(n){return n<10?"0"+n:String(n);}
function initDates(){
  var n=new Date(),r=new Date(n.getTime()+3600000);
  var td=n.getFullYear()+"-"+pad(n.getMonth()+1)+"-"+pad(n.getDate());
  document.getElementById("dd").value=td;
  document.getElementById("hd").value=pad(n.getHours())+":"+pad(n.getMinutes());
  document.getElementById("dr").value=td;
  document.getElementById("hr").value=pad(r.getHours())+":"+pad(r.getMinutes());
}

function loadAll(){
  var loaded={v:false,p:false};
  function onVP(){
    if(!loaded.v||!loaded.p)return;
    fillSel();renVeh();renDash();renList();updStats();
  }
  gasCall('getVehicules',null,function(d){V=Array.isArray(d)?d:[];loaded.v=true;onVP();},function(e){toast('Err vehicules','err');});
  gasCall('getBenevoles',null,function(d){B=Array.isArray(d)?d:[];renBenv('');},null);
  gasCall('getPrets',null,function(d){P=Array.isArray(d)?d:[];loaded.p=true;onVP();},function(e){toast('Err prets','err');});
}

function nav(i){
  for(var j=0;j<4;j++){
    document.getElementById("pg"+j).className="pg"+(j===i?" on":"");
    document.getElementById("bni"+j).className="bni"+(j===i?" on":"");
  }
  if(i===1)rstForm();
  window.scrollTo(0,0);
}

function updStats(){
  var enc=0,ter=0;
  for(var i=0;i<P.length;i++){
    if(String(P[i].Statut).trim()==="En cours")enc++;
    if(String(P[i].Statut).trim()==="Termine"||String(P[i].Statut).indexOf("Termin")===0)ter++;
  }
  document.getElementById("s0").textContent=P.length;
  document.getElementById("s1").textContent=enc;
  document.getElementById("s2").textContent=ter;
  document.getElementById("s3").textContent=V.length;
}

function dispo(v){
  var vid=String(v.VehiculeID||"").trim();
  var plaque=String(v.Plaque||"").trim();
  var lnde=String(v["NuméroLNDE"]||v.NumeroLNDE||"").trim();
  for(var i=0;i<P.length;i++){
    if(String(P[i].Statut||"").trim()!=="En cours")continue;
    var pvid=String(P[i].VehiculeID||"").trim();
    var ppl=String(P[i].Plaque||"").trim();
    var plnd=String(P[i].NumeroLNDE||"").trim();
    if(vid&&pvid&&vid===pvid)return false;
    if(plaque&&ppl&&plaque===ppl)return false;
    if(lnde&&plnd&&lnde===plnd)return false;
  }
  return true;
}

function fillSel(){
  var s=document.getElementById("sel-v");
  if(!s)return;
  s.innerHTML="<option value=''>-- Selectionner --</option>";
  if(!V||V.length===0){
    return; // V vide, sera charge par loadAll
  }
  for(var i=0;i<V.length;i++){
    var v=V[i];
    var lnde=v["NuméroLNDE"]||v.NumeroLNDE||"";
    var d=dispo(v);
    var o=document.createElement("option");
    o.value=String(i);
    o.text=(d?"":"[INDISPO] ")+(lnde||v.Plaque||"?")+(v.Type?" - "+v.Type:"")+(v.Carburant?" ("+v.Carburant+")":"");
    s.appendChild(o);
  }
}

function onVeh(){
  var s=document.getElementById("sel-v");
  var box=document.getElementById("v-info");
  if(s.value===""){selV=null;box.style.display="none";return;}
  selV=V[parseInt(s.value,10)];
  if(selV){
    var lnde=selV["NuméroLNDE"]||selV.NumeroLNDE||"";
    box.style.display="block";
    box.innerHTML="<strong>"+(lnde||selV.Plaque||"")+"</strong>"+(selV.Type?" — "+selV.Type:"")+(selV.Plaque?" | "+selV.Plaque:"");
  }
}

function s1next(){if(!selV){toast("Selectionnez un vehicule","err");return;}gos(1);}

function gos(n){
  for(var i=0;i<4;i++){
    document.getElementById("sp"+i).className="sp"+(i===n?" on":"");
    var si=document.getElementById("si"+i);
    si.className="stp"+(i===n?" on":i<n?" dn":"");
  }
  if(n===1&&selV){
    var lnde=selV["NuméroLNDE"]||selV.NumeroLNDE||"";
    document.getElementById("v-recap").innerHTML="<strong>"+(lnde||selV.Plaque)+"</strong>"+(selV.Type?" — "+selV.Type:"");
  }
  if(n===3){bldRecap();initSig();}
  window.scrollTo(0,0);
}

function chkDispo(){
  var dd=document.getElementById("dd").value,hd=document.getElementById("hd").value;
  var dr=document.getElementById("dr").value,hr=document.getElementById("hr").value;
  if(!dd||!hd||!dr||!hr){showDM("Remplissez toutes les dates.",false);return;}
  if(new Date(dd+"T"+hd)>=new Date(dr+"T"+hr)){showDM("Le retour doit etre apres le depart.",false);return;}
  gasCall('verifierDisponibilite',{vehiculeId:selV.VehiculeID||selV.Plaque,dateDepart:dd,heureDepart:hd,dateRetour:dr,heureRetour:hr},function(r){if(r.disponible){showDM('Vehicule disponible !',true);document.getElementById('btn-dispo-next').style.display='inline-flex';}else{showDM('Indisponible: '+r.message,false);}},function(e){showDM('Erreur: '+e.message,false);});
}

function showDM(msg,ok){
  var e=document.getElementById("dm");
  e.style.display="block";
  e.style.background=ok?"var(--ok-b)":"var(--err-b)";
  e.style.color=ok?"var(--ok)":"var(--err)";
  e.style.border="1px solid "+(ok?"#A5DEC0":"#F5B4B0");
  e.textContent=msg;
}

function renBenv(f){
  var c=document.getElementById("bl");
  var items=[];
  for(var i=0;i<B.length;i++){
    var b=B[i];
    if(!f){items.push({b:b,i:i});}
    else{
      var fl=f.toLowerCase();
      var pr=b["Prénom"]||b.Prenom||"";
      if((b.Nom||"").toLowerCase().indexOf(fl)>-1||pr.toLowerCase().indexOf(fl)>-1||(b.Commission||"").toLowerCase().indexOf(fl)>-1)
        items.push({b:b,i:i});
    }
  }
  if(!items.length){c.innerHTML="<div class='emp'>Aucun benevole</div>";return;}
  var h="";
  for(var j=0;j<items.length;j++){
    var b=items[j].b,ri=items[j].i;
    var pr=b["Prénom"]||b.Prenom||"";
    var ini=(pr.charAt(0)+(b.Nom||"").charAt(0)).toUpperCase();
    var sel=selB!==null&&B.indexOf(selB)===ri;
    h+="<div class='bi"+(sel?" on":"")+"' onclick='selBenv("+ri+")'>"
     +"<div class='bav'>"+ini+"</div>"
     +"<div><div style='font-size:22px;font-weight:500'>"+pr+" "+(b.Nom||"")+"</div>"
     +"<div style='font-size:18px;color:var(--txt2)'>"+(b.Commission||"")+"</div></div>"
     +(sel?"<svg width='18' height='18' viewBox='0 0 24 24' fill='var(--acc)' style='margin-left:auto'><path d='M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z'/></svg>":"")
     +"</div>";
  }
  c.innerHTML=h;
}

function selBenv(i){selB=B[i];renBenv(document.getElementById("sb").value);}
function s3next(){if(!selB){toast("Selectionnez un benevole","err");return;}gos(3);}

function fmtD(d){if(!d)return"";var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}

function bldRecap(){
  var pr=selB["Prénom"]||selB.Prenom||"";
  var lnde=selV["NuméroLNDE"]||selV.NumeroLNDE||selV.Plaque||"";
  document.getElementById("recap").innerHTML=
    "<strong>Vehicule:</strong> "+lnde+(selV.Type?" — "+selV.Type:"")+"<br>"
   +"<strong>Plaque:</strong> "+(selV.Plaque||"—")+"<br>"
   +"<strong>Benevole:</strong> "+pr+" "+(selB.Nom||"")+"<br>"
   +"<strong>Depart:</strong> "+fmtD(document.getElementById("dd").value)+" à "+document.getElementById("hd").value+"<br>"
   +"<strong>Retour:</strong> "+fmtD(document.getElementById("dr").value)+" à "+document.getElementById("hr").value;
}

function initSig(){
  sc=document.getElementById("sig");sx=sc.getContext("2d");
  var r=sc.getBoundingClientRect();
  sc.width=Math.round(r.width)||320;sc.height=130;
  sx.strokeStyle="#1A1916";sx.lineWidth=2.5;sx.lineCap="round";sx.lineJoin="round";
  sdh=false;
  sc.onmousedown=function(e){sdr=true;sdh=true;var p=spos(e);sx.beginPath();sx.moveTo(p.x,p.y);};
  sc.onmousemove=function(e){if(!sdr)return;var p=spos(e);sx.lineTo(p.x,p.y);sx.stroke();sx.beginPath();sx.moveTo(p.x,p.y);};
  sc.onmouseup=sc.onmouseleave=function(){sdr=false;};
  sc.ontouchstart=function(e){e.preventDefault();sdr=true;sdh=true;var p=spos(e.touches[0]);sx.beginPath();sx.moveTo(p.x,p.y);};
  sc.ontouchmove=function(e){e.preventDefault();if(!sdr)return;var p=spos(e.touches[0]);sx.lineTo(p.x,p.y);sx.stroke();sx.beginPath();sx.moveTo(p.x,p.y);};
  sc.ontouchend=function(){sdr=false;};
}
function spos(e){var r=sc.getBoundingClientRect();return{x:(e.clientX-r.left)*(sc.width/r.width),y:e.clientY-r.top};}
function clrSig(){if(sx)sx.clearRect(0,0,sc.width,sc.height);sdh=false;}

function valider(){
  if(!sdh){toast("Signez avant de valider","err");return;}
  var btn=document.getElementById("bval");
  btn.textContent="Enregistrement...";
  var pr=selB["Prénom"]||selB.Prenom||"";
  var lnde=selV["NuméroLNDE"]||selV.NumeroLNDE||"";
  gasCall('creerPret',{VehiculeID:selV.VehiculeID||'',Plaque:selV.Plaque||'',NumeroLNDE:lnde,TypeVehicule:selV.Type||'',IDKEY:selB.IDKEY||'',NomPrenom:pr+' '+(selB.Nom||''),DateDepart:document.getElementById('dd').value,HeureDepart:document.getElementById('hd').value,DateRetour:document.getElementById('dr').value,HeureRetour:document.getElementById('hr').value,Signature:sc.toDataURL('image/png')},function(r){if(r.error){toast(r.error,'err');btn.textContent='Valider';}else{toast('Pret enregistre !','ok');loadAll();nav(0);}},function(e){toast('Erreur: '+e.message,'err');btn.textContent='Valider';});
}

function rstForm(){
  selV=null;selB=null;gos(0);
  document.getElementById("sel-v").value="";
  document.getElementById("v-info").style.display="none";
  document.getElementById("dm").style.display="none";
  var bn=document.getElementById("btn-dispo-next");if(bn)bn.style.display="none";
  document.getElementById("sb").value="";
  renBenv("");initDates();if(sx)clrSig();fillSel();
}

function renDash(){
  var c=document.getElementById("dash-list");
  var enc=[];
  for(var i=0;i<P.length;i++){if(String(P[i].Statut).trim()==="En cours")enc.push(P[i]);}
  if(!enc.length){c.innerHTML="<div class='emp'>Aucun pret en cours</div>";return;}
  var h="";
  for(var i=0;i<enc.length;i++){
    var p=enc[i];
    h+="<div class='pc'>"
     +"<div class='pc-head'><div><div class='pc-veh'>"+(p.NumeroLNDE||p.Plaque||"—")+"</div><div class='pc-sub'>"+(p.TypeVehicule||"")+" — "+(p.NomPrenom||"")+"</div></div>"
     +"<span class='bdg bwarn'><span class='dot'></span> En cours</span></div>"
     +"<div class='pc-body'>Depart: "+fmtD(p.DateDepart)+" "+p.HeureDepart+"<br>Retour: "+fmtD(p.DateRetour)+" "+p.HeureRetour+"</div>"
     +"<div class='pc-foot'><button class='btn bo bsm' onclick='tPret(this)' data-id='"+p.ID+"'>Terminer</button></div>"
     +"</div>";
  }
  c.innerHTML=h;
}

function setF(v,el){
  filt=v;
  var chips=document.querySelectorAll(".ch");
  for(var i=0;i<chips.length;i++)chips[i].className="ch";
  el.className="ch on";renList();
}

function renList(){
  var c=document.getElementById("lst-list");
  var list=[];
  for(var i=P.length-1;i>=0;i--){
    var s=String(P[i].Statut||"").trim();
    if(filt===0||(filt===1&&s==="En cours")||(filt===2&&(s==="Termine"||s.indexOf("Termin")===0)))list.push(P[i]);
  }
  document.getElementById("lc").textContent="("+list.length+")";
  if(!list.length){c.innerHTML="<div class='emp'>Aucun pret</div>";return;}
  var h="";
  for(var i=0;i<list.length;i++){
    var p=list[i];
    var enc=String(p.Statut||"").trim()==="En cours";
    h+="<div class='pc'>"
     +"<div class='pc-head'><div><div class='pc-veh'>"+(p.NumeroLNDE||p.Plaque||"—")+"</div><div class='pc-sub'>"+(p.TypeVehicule||"")+" — "+(p.NomPrenom||"")+"</div></div>"
     +"<span class='bdg "+(enc?"bwarn":"bok")+"'><span class='dot'></span> "+(p.Statut||"")+"</span></div>"
     +"<div class='pc-body'>Depart: "+fmtD(p.DateDepart)+" "+p.HeureDepart+"<br>Retour: "+fmtD(p.DateRetour)+" "+p.HeureRetour+"</div>"
     +"<div class='pc-foot'>"
     +(enc?"<button class='btn bo bsm' onclick='tPret(this)' data-id='"+p.ID+"'>Terminer</button>":"")
     +"<button class='btn bd bsm' onclick='dPret(this)' data-id='"+p.ID+"'>Supprimer</button>"
     +"</div></div>";
  }
  c.innerHTML=h;
}

function renVeh(){
  var c=document.getElementById("veh-list");
  document.getElementById("vc").textContent="("+V.length+")";
  if(!V.length){c.innerHTML="<div class='emp'>Aucun vehicule</div>";return;}
  var h="";
  for(var i=0;i<V.length;i++){
    var v=V[i];
    var lnde=v["NuméroLNDE"]||v.NumeroLNDE||"—";
    var d=dispo(v);
    h+="<div class='vrow"+(d?"":" ind")+"'>"
     +"<div class='vrow-l'>"
     +"<div class='vrow-lnde' style='"+(d?"":"color:#8B2020")+"'>"+lnde+"</div>"
     +"<div class='vrow-type'>"+(v.Type||"")+"</div>"
     +"<div class='vrow-plaque'>"+(v.Plaque||"")+(v.Carburant?" · "+v.Carburant:"")+"</div>"
     +"</div>"
     +"<span class='bdg "+(d?"bok":"berr")+"'><span class='dot'></span>"+(d?" OK":" Indispo")+"</span>"
     +"</div>";
  }
  c.innerHTML=h;
}

function tPret(btn){
  var id=btn.getAttribute("data-id");
  oMod("Terminer le pret","<p style='font-size:14px;color:var(--txt2)'>Confirmer le retour ?</p>",
    "<button class='btn bs' style='flex:1' onclick='cMod()'>Annuler</button><button class='btn bo' style='flex:1' onclick='doTerm(this)' data-id='"+id+"'>Confirmer</button>");
}
function doTerm(btn){var id=btn.getAttribute("data-id");cMod();gasCall('terminerPret',{pretId:id},function(r){if(r.error)toast(r.error,'err');else{toast('Termine !','ok');loadAll();}},function(e){toast(e.message,'err');});}
function dPret(btn){
  var id=btn.getAttribute("data-id");
  oMod("Supprimer","<p style='font-size:14px;color:var(--txt2)'>Action irreversible.</p>",
    "<button class='btn bs' style='flex:1' onclick='cMod()'>Annuler</button><button class='btn bd' style='flex:1' onclick='doSupp(this)' data-id='"+id+"'>Supprimer</button>");
}
function doSupp(btn){var id=btn.getAttribute("data-id");cMod();gasCall('supprimerPret',{pretId:id},function(r){if(r.error)toast(r.error,'err');else{toast('Supprime','ok');loadAll();}},function(e){toast(e.message,'err');});}

function oMod(t,b,f){document.getElementById("mt").textContent=t;document.getElementById("mb").innerHTML=b;document.getElementById("mf").innerHTML=f;document.getElementById("modal").className="mo";}
function cMod(){document.getElementById("modal").className="mo hid";}
function toast(msg,type){var t=document.getElementById("toast");t.textContent=msg;t.className="toast on"+(type?" "+type:"");setTimeout(function(){t.className="toast";},3000);}
</script>
</body>
</html>
